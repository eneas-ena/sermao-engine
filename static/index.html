<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#071d33" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Infográficos" />
    <title>Infográficos de Sermões</title>
    <link rel="icon" type="image/png" href="/static/app-icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-icon" src="/static/app-icon.png" alt="" />
          <div>
            <p class="eyebrow">Aplicativo online</p>
            <h1>Infográficos de Sermões</h1>
          </div>
        </div>
        <div class="actions">
          <button id="analyzeBtn" class="primary">Analisar sermão</button>
          <button id="exportBtn" class="secondary" disabled>Gerar arquivos</button>
          <button id="clearBtn" class="icon-action" title="Limpar o sermão" disabled aria-label="Limpar o sermão">Limpar</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel input-panel">
          <h2>Entrada</h2>
          <label class="upload">
            <span>DOCX do sermão</span>
            <input id="docxInput" type="file" accept=".docx" />
          </label>
          <label class="upload">
            <span>Projeto salvo anteriormente</span>
            <input id="projectInput" type="file" accept=".json,application/json" />
          </label>
          <label class="field">
            <span>Ou cole o texto</span>
            <textarea id="sermonText" placeholder="Cole aqui o texto do sermão..."></textarea>
          </label>
        </aside>

        <section class="panel editor-panel">
          <div class="panel-head">
            <h2>Revisão</h2>
            <span id="status" class="status">Aguardando sermão</span>
          </div>

          <div class="grid two">
            <label class="field">
              <span>Título</span>
              <input id="titleInput" />
            </label>
            <label class="field">
              <span>Subtítulo</span>
              <input id="subtitleInput" />
            </label>
          </div>

          <div class="grid two">
            <label class="field">
              <span>Referência bíblica</span>
              <input id="refInput" />
            </label>
            <label class="field">
              <span>Texto bíblico</span>
              <input id="verseInput" />
            </label>
          </div>

          <label class="field">
            <span>Introdução</span>
            <textarea id="introInput" class="short"></textarea>
          </label>

          <section class="formatting">
            <div class="cards-head">
              <h3>Aparência dos slides</h3>
              <span class="helper">Também poderá ser alterada depois no PowerPoint</span>
            </div>
            <div class="grid four">
              <label class="field">
                <span>Tamanho do título</span>
                <input id="titleSizeInput" type="number" min="36" max="72" value="54" />
              </label>
              <label class="field">
                <span>Títulos dos slides</span>
                <input id="slideTitleSizeInput" type="number" min="26" max="48" value="34" />
              </label>
              <label class="field">
                <span>Corpo do texto</span>
                <input id="bodySizeInput" type="number" min="16" max="32" value="22" />
              </label>
              <label class="upload compact">
                <span>Imagem de capa (opcional)</span>
                <input id="coverImageInput" type="file" accept="image/png,image/jpeg,image/webp" />
              </label>
            </div>
          </section>

          <div class="cards-head">
            <h3>Cards</h3>
            <button id="addCardBtn" class="ghost" disabled>Adicionar card</button>
          </div>
          <div id="cardsEditor" class="cards-editor"></div>

          <div class="grid three">
            <label class="field">
              <span>Aplicação</span>
              <textarea id="applicationInput" class="short"></textarea>
            </label>
            <label class="field">
              <span>Desafio</span>
              <textarea id="challengeInput" class="short"></textarea>
            </label>
            <label class="field">
              <span>Apelo</span>
              <textarea id="appealInput" class="short"></textarea>
            </label>
          </div>
        </section>

        <aside class="panel preview-panel">
          <h2>Saída</h2>
          <div id="preview" class="preview">
            <span>Os arquivos gerados aparecerão aqui.</span>
          </div>
          <div id="downloads" class="downloads"></div>
          <p class="edit-note">O PowerPoint editável permite mudar textos, fontes, cores, posições e imagens.</p>
        </aside>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
